apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/managed-by: argocd
data:
  sre-donation-service.json: |
    {
      "title": "SRE — donation-service",
      "uid": "sre-donation",
      "tags": ["sre", "donation-service", "slo", "golden-metrics"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Taxa de Sucesso vs SLO (99.9%)",
          "description": "SLI: Porcentagem de requisições com status != 5xx. SLO: >= 99.9%",
          "type": "gauge",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 7},
          "targets": [
            {
              "expr": "rate(http_requests_total{service=\"donation-service\",status!~\"5..\"}[5m]) / rate(http_requests_total{service=\"donation-service\"}[5m]) * 100",
              "legendFormat": "Taxa de Sucesso %",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 98,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 99.5},
                  {"color": "green", "value": 99.9}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 2,
          "title": "Error Budget Restante — 30 dias",
          "description": "Quanto do orçamento de erros do SLO 99.9% ainda resta no período de 30 dias.",
          "type": "stat",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 7},
          "targets": [
            {
              "expr": "(1 - (sum(increase(http_requests_total{service=\"donation-service\",status=~\"5..\"}[30d])) / sum(increase(http_requests_total{service=\"donation-service\"}[30d])))) / (1 - 0.999) * 100",
              "legendFormat": "Error Budget %",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 10},
                  {"color": "green", "value": 50}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "Latência P50 / P95 / P99",
          "description": "SLI: P99 de latência das requisições. SLO: P99 <= 500ms",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket{service=\"donation-service\"}[5m]))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service=\"donation-service\"}[5m]))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{service=\"donation-service\"}[5m]))",
              "legendFormat": "P99 (SLO: ≤500ms)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineWidth": 2,
                "thresholdsStyle": {"mode": "line"}
              },
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 0.5}
                ]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "P99 (SLO: ≤500ms)"},
                "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]
              }
            ]
          }
        },
        {
          "id": 4,
          "title": "Requisições por Segundo (RPS) — por Status",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 7, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"donation-service\",status=~\"2..\"}[1m]))",
              "legendFormat": "2xx (sucesso)"
            },
            {
              "expr": "sum(rate(http_requests_total{service=\"donation-service\",status=~\"4..\"}[1m]))",
              "legendFormat": "4xx (cliente)"
            },
            {
              "expr": "sum(rate(http_requests_total{service=\"donation-service\",status=~\"5..\"}[1m]))",
              "legendFormat": "5xx (erro)"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"},
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "5xx (erro)"},
                "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}}]
              },
              {
                "matcher": {"id": "byName", "options": "2xx (sucesso)"},
                "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]
              }
            ]
          }
        },
        {
          "id": 5,
          "title": "Saturation — CPU dos Pods (donation-service)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 7, "w": 6, "h": 7},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container=\"donation-service\"}[5m])) by (pod)",
              "legendFormat": "CPU {{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 0.7},
                  {"color": "red", "value": 0.9}
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "Saturation — Memória dos Pods (donation-service)",
          "type": "timeseries",
          "gridPos": {"x": 18, "y": 7, "w": 6, "h": 7},
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"solidarytech\", container=\"donation-service\"}) by (pod) / 1024 / 1024",
              "legendFormat": "Mem MB {{ pod }}"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"solidarytech\", container=\"donation-service\", resource=\"memory\"}) by (pod) / 1024 / 1024",
              "legendFormat": "Limit MB {{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "decmbytes"}
          }
        },
        {
          "id": 7,
          "title": "Pods disponíveis — donation-service",
          "type": "stat",
          "gridPos": {"x": 0, "y": 14, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"solidarytech\", deployment=\"donation-service\"}",
              "legendFormat": "Pods disponíveis",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 2}
                ]
              }
            }
          },
          "options": {"colorMode": "background", "graphMode": "none"}
        },
        {
          "id": 8,
          "title": "Taxa de Erro (últimas 5m)",
          "type": "stat",
          "gridPos": {"x": 4, "y": 14, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"donation-service\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{service=\"donation-service\"}[5m])) * 100",
              "legendFormat": "Error Rate %",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 0.05},
                  {"color": "red", "value": 0.1}
                ]
              }
            }
          },
          "options": {"colorMode": "background", "graphMode": "none"}
        },
        {
          "id": 9,
          "title": "Reinicializações de Pods (CrashLoop)",
          "type": "timeseries",
          "gridPos": {"x": 8, "y": 14, "w": 8, "h": 5},
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"solidarytech\"}[15m])",
              "legendFormat": "Restarts {{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 10,
          "title": "HPA — Réplicas desejadas vs disponíveis",
          "type": "timeseries",
          "gridPos": {"x": 16, "y": 14, "w": 8, "h": 5},
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"solidarytech\", horizontalpodautoscaler=\"donation-service-hpa\"}",
              "legendFormat": "Desejadas"
            },
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"solidarytech\", horizontalpodautoscaler=\"donation-service-hpa\"}",
              "legendFormat": "Atuais"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"solidarytech\", horizontalpodautoscaler=\"donation-service-hpa\"}",
              "legendFormat": "Máximo"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "pod",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(kube_pod_info{namespace=\"solidarytech\"}, pod)",
            "refresh": 2,
            "multi": true,
            "includeAll": true
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "name": "Alertas",
            "datasource": "Prometheus",
            "enable": true,
            "expr": "ALERTS{service=\"donation-service\",alertstate=\"firing\"}",
            "iconColor": "red",
            "titleFormat": "{{ alertname }}"
          }
        ]
      }
    }

  solidarytech-overview.json: |
    {
      "title": "SolidaryTech — Overview dos Serviços",
      "uid": "solidarytech-overview",
      "tags": ["overview", "solidarytech", "golden-metrics"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "ngo-service — RPS",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 6},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"ngo-service\"}[1m])) by (status)",
              "legendFormat": "Status {{ status }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 2,
          "title": "donation-service — RPS",
          "type": "timeseries",
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 6},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"donation-service\"}[1m])) by (status)",
              "legendFormat": "Status {{ status }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 3,
          "title": "volunteer-service — RPS",
          "type": "timeseries",
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 6},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"volunteer-service\"}[1m])) by (status)",
              "legendFormat": "Status {{ status }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 4,
          "title": "Latência P99 — Todos os Serviços",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 6, "w": 24, "h": 7},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{service=\"ngo-service\"}[5m]))",
              "legendFormat": "ngo-service P99"
            },
            {
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{service=\"donation-service\"}[5m]))",
              "legendFormat": "donation-service P99 (SLO: ≤500ms)"
            },
            {
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{service=\"volunteer-service\"}[5m]))",
              "legendFormat": "volunteer-service P99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 0.5}
                ]
              },
              "custom": {"thresholdsStyle": {"mode": "line"}}
            }
          }
        },
        {
          "id": 5,
          "title": "Taxa de Erro — Todos os Serviços",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 13, "w": 24, "h": 7},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"ngo-service\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{service=\"ngo-service\"}[5m])) * 100",
              "legendFormat": "ngo-service error %"
            },
            {
              "expr": "sum(rate(http_requests_total{service=\"donation-service\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{service=\"donation-service\"}[5m])) * 100",
              "legendFormat": "donation-service error % (SLO: ≤0.1%)"
            },
            {
              "expr": "sum(rate(http_requests_total{service=\"volunteer-service\",status=~\"5..\"}[5m])) / sum(rate(http_requests_total{service=\"volunteer-service\"}[5m])) * 100",
              "legendFormat": "volunteer-service error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 0.1}
                ]
              },
              "custom": {"thresholdsStyle": {"mode": "line"}}
            }
          }
        },
        {
          "id": 6,
          "title": "CPU Usage — namespace solidarytech",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}[5m])) by (container)",
              "legendFormat": "{{ container }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}}
        },
        {
          "id": 7,
          "title": "Memória Usage — namespace solidarytech",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}) by (container) / 1024 / 1024",
              "legendFormat": "{{ container }} MB"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "id": 8,
          "title": "Pods por Serviço — Status",
          "type": "table",
          "gridPos": {"x": 0, "y": 27, "w": 24, "h": 6},
          "targets": [
            {
              "expr": "kube_pod_status_phase{namespace=\"solidarytech\"}",
              "legendFormat": "{{ pod }} — {{ phase }}",
              "instant": true,
              "format": "table"
            }
          ],
          "options": {"sortBy": [{"displayName": "pod", "desc": false}]}
        }
      ]
    }

  finops-costs.json: |
    {
      "title": "FinOps — Consumo de Recursos",
      "uid": "finops-costs",
      "tags": ["finops", "rightsizing", "costs"],
      "timezone": "browser",
      "refresh": "5m",
      "time": {"from": "now-24h", "to": "now"},
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "CPU Request vs Usage — Rightsizing",
          "description": "Compara o que foi alocado (request) vs o que está sendo consumido. Gap grande = desperdício.",
          "type": "bargauge",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"solidarytech\", resource=\"cpu\"}) by (container)",
              "legendFormat": "Request — {{ container }}"
            },
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}[5m])) by (container)",
              "legendFormat": "Usage — {{ container }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 2,
          "title": "Memória Request vs Usage — Rightsizing",
          "type": "bargauge",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"solidarytech\", resource=\"memory\"}) by (container) / 1024 / 1024",
              "legendFormat": "Request MB — {{ container }}"
            },
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}) by (container) / 1024 / 1024",
              "legendFormat": "Usage MB — {{ container }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}},
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 3,
          "title": "Histórico de CPU — 24h (baseline para rightsizing)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 8, "w": 24, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}[5m])) by (container)",
              "legendFormat": "{{ container }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}}
        },
        {
          "id": 4,
          "title": "Nós do Cluster — CPU Alocada vs Capacidade",
          "type": "gauge",
          "gridPos": {"x": 0, "y": 16, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\"}) / sum(kube_node_status_allocatable{resource=\"cpu\"}) * 100",
              "legendFormat": "% CPU Alocada",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Nós do Cluster — Memória Alocada vs Capacidade",
          "type": "gauge",
          "gridPos": {"x": 12, "y": 16, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\"}) / sum(kube_node_status_allocatable{resource=\"memory\"}) * 100",
              "legendFormat": "% Memória Alocada",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        }
      ]
    }
