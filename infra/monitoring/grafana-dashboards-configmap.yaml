apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/managed-by: argocd
data:
  sre-donation-service.json: |
    {
      "title": "SRE — donation-service",
      "uid": "sre-donation",
      "tags": ["sre", "donation-service", "slo", "golden-metrics"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "SLO — Disponibilidade (SLO: >= 99.9%)",
          "description": "SLI: pods ready / pods desejados. Proxy de disponibilidade do donation-service.",
          "type": "gauge",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 7},
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"solidarytech\", deployment=\"donation-service\"} / kube_deployment_status_replicas{namespace=\"solidarytech\", deployment=\"donation-service\"} * 100",
              "legendFormat": "Disponibilidade %",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 50},
                  {"color": "green", "value": 99.9}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 2,
          "title": "Error Budget — Restarts vs SLO",
          "description": "SLI: ausência de restarts. 0 restarts = 100% do Error Budget. Cada restart consome budget.",
          "type": "stat",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 7},
          "targets": [
            {
              "expr": "clamp_max(100 - (increase(kube_pod_container_status_restarts_total{namespace=\"solidarytech\", container=\"donation-service\"}[30d]) * 10), 100)",
              "legendFormat": "Error Budget %",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 10},
                  {"color": "green", "value": 50}
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "Tráfego de Rede — Throughput (Golden Metric: Traffic)",
          "description": "Bytes recebidos pelos pods do donation-service — proxy de volume de requisições.",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"solidarytech\", pod=~\"donation-service.*\"}[5m])) by (pod)",
              "legendFormat": "Recv {{ pod }}"
            },
            {
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"solidarytech\", pod=~\"donation-service.*\"}[5m])) by (pod)",
              "legendFormat": "Send {{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {"lineWidth": 2}
            }
          }
        },
        {
          "id": 4,
          "title": "CPU Usage — donation-service (Golden Metric: Saturation)",
          "description": "Taxa de uso de CPU por pod. SLO implícito: abaixo do limit de 200m.",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 7, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container=\"donation-service\"}[5m])) by (pod)",
              "legendFormat": "CPU {{ pod }}"
            },
            {
              "expr": "kube_pod_container_resource_limits{namespace=\"solidarytech\", container=\"donation-service\", resource=\"cpu\"}",
              "legendFormat": "Limit CPU"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"lineWidth": 2},
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 0.15},
                  {"color": "red", "value": 0.18}
                ]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Limit CPU"},
                "properties": [
                  {"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}},
                  {"id": "custom.lineStyle", "value": {"fill": "dash"}}
                ]
              }
            ]
          }
        },
        {
          "id": 5,
          "title": "Memória — donation-service vs Limit",
          "description": "Memória working set vs limit configurado (128Mi).",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 7, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"solidarytech\", container=\"donation-service\"}) by (pod) / 1024 / 1024",
              "legendFormat": "Mem MB {{ pod }}"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"solidarytech\", container=\"donation-service\", resource=\"memory\"}) by (pod) / 1024 / 1024",
              "legendFormat": "Limit MB {{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {"lineWidth": 2}
            },
            "overrides": [
              {
                "matcher": {"id": "byRegexp", "options": "Limit.*"},
                "properties": [
                  {"id": "color", "value": {"mode": "fixed", "fixedColor": "red"}},
                  {"id": "custom.lineStyle", "value": {"fill": "dash"}}
                ]
              }
            ]
          }
        },
        {
          "id": 6,
          "title": "Pods disponíveis — donation-service",
          "type": "stat",
          "gridPos": {"x": 0, "y": 14, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"solidarytech\", deployment=\"donation-service\"}",
              "legendFormat": "Pods disponíveis",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "red", "value": 0},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 2}
                ]
              }
            }
          },
          "options": {"colorMode": "background", "graphMode": "none"}
        },
        {
          "id": 7,
          "title": "Taxa de Erro — CPU Throttling (Golden Metric: Errors)",
          "description": "Porcentagem de períodos de CPU throttled. Alta throttling indica saturação e impacto na latência.",
          "type": "stat",
          "gridPos": {"x": 4, "y": 14, "w": 4, "h": 5},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_cfs_throttled_periods_total{namespace=\"solidarytech\", container=\"donation-service\"}[5m])) / sum(rate(container_cpu_cfs_periods_total{namespace=\"solidarytech\", container=\"donation-service\"}[5m])) * 100",
              "legendFormat": "Throttle %",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 25},
                  {"color": "red", "value": 50}
                ]
              }
            }
          },
          "options": {"colorMode": "background", "graphMode": "none"}
        },
        {
          "id": 8,
          "title": "Reinicializações de Pods (CrashLoop)",
          "type": "timeseries",
          "gridPos": {"x": 8, "y": 14, "w": 8, "h": 5},
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"solidarytech\"}[15m])",
              "legendFormat": "Restarts {{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 9,
          "title": "HPA — Réplicas desejadas vs disponíveis",
          "type": "timeseries",
          "gridPos": {"x": 16, "y": 14, "w": 8, "h": 5},
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"solidarytech\", horizontalpodautoscaler=\"donation-service-hpa\"}",
              "legendFormat": "Desejadas"
            },
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"solidarytech\", horizontalpodautoscaler=\"donation-service-hpa\"}",
              "legendFormat": "Atuais"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"solidarytech\", horizontalpodautoscaler=\"donation-service-hpa\"}",
              "legendFormat": "Máximo"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "pod",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(kube_pod_info{namespace=\"solidarytech\"}, pod)",
            "refresh": 2,
            "multi": true,
            "includeAll": true
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "name": "Alertas",
            "datasource": "Prometheus",
            "enable": true,
            "expr": "ALERTS{alertstate=\"firing\"}",
            "iconColor": "red",
            "titleFormat": "{{ alertname }}"
          }
        ]
      }
    }

  solidarytech-overview.json: |
    {
      "title": "SolidaryTech — Overview dos Serviços",
      "uid": "solidarytech-overview",
      "tags": ["overview", "solidarytech", "golden-metrics"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Pods Running — ngo-service",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "options": {"colorMode": "background", "graphMode": "none", "textMode": "auto"},
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{"expr": "sum(kube_pod_status_phase{namespace=\"solidarytech\", pod=~\"ngo-service.*\", phase=\"Running\"})", "legendFormat": "Pods", "refId": "A"}]
        },
        {
          "id": 2,
          "title": "Pods Running — donation-service ⚡",
          "type": "stat",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "options": {"colorMode": "background", "graphMode": "none", "textMode": "auto"},
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "yellow", "value": 1}, {"color": "green", "value": 2}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{"expr": "sum(kube_pod_status_phase{namespace=\"solidarytech\", pod=~\"donation-service.*\", phase=\"Running\"})", "legendFormat": "Pods", "refId": "A"}]
        },
        {
          "id": 3,
          "title": "Pods Running — volunteer-service",
          "type": "stat",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "options": {"colorMode": "background", "graphMode": "none", "textMode": "auto"},
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{"expr": "sum(kube_pod_status_phase{namespace=\"solidarytech\", pod=~\"volunteer-service.*\", phase=\"Running\"})", "legendFormat": "Pods", "refId": "A"}]
        },
        {
          "id": 4,
          "title": "Réplicas Disponíveis por Serviço",
          "type": "stat",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 4},
          "options": {"colorMode": "background", "graphMode": "none", "orientation": "horizontal"},
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [
            {"expr": "kube_deployment_status_replicas_available{namespace=\"solidarytech\", deployment=\"ngo-service\"}", "legendFormat": "ngo-service", "refId": "A"},
            {"expr": "kube_deployment_status_replicas_available{namespace=\"solidarytech\", deployment=\"donation-service\"}", "legendFormat": "donation-service ⚡", "refId": "B"},
            {"expr": "kube_deployment_status_replicas_available{namespace=\"solidarytech\", deployment=\"volunteer-service\"}", "legendFormat": "volunteer-service", "refId": "C"}
          ]
        },
        {
          "id": 5,
          "title": "CPU Usage — por container (solidarytech)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "options": {"tooltip": {"mode": "multi"}},
          "fieldConfig": {
            "defaults": {"unit": "percentunit", "custom": {"lineWidth": 2}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "donation-service"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "orange"}}]},
              {"matcher": {"id": "byName", "options": "ngo-service"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "blue"}}]},
              {"matcher": {"id": "byName", "options": "volunteer-service"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}
            ]
          },
          "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}[2m])) by (container)", "legendFormat": "{{container}}", "refId": "A"}]
        },
        {
          "id": 6,
          "title": "Memória Usage — por container (solidarytech)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "options": {"tooltip": {"mode": "multi"}},
          "fieldConfig": {
            "defaults": {"unit": "decmbytes", "custom": {"lineWidth": 2}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "donation-service"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "orange"}}]},
              {"matcher": {"id": "byName", "options": "ngo-service"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "blue"}}]},
              {"matcher": {"id": "byName", "options": "volunteer-service"}, "properties": [{"id": "color", "value": {"mode": "fixed", "fixedColor": "green"}}]}
            ]
          },
          "targets": [{"expr": "sum(container_memory_working_set_bytes{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}) by (container) / 1024 / 1024", "legendFormat": "{{container}}", "refId": "A"}]
        },
        {
          "id": 7,
          "title": "HPA — Réplicas Atuais vs Desejadas",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "options": {"tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 2}}},
          "targets": [
            {"expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"solidarytech\"}", "legendFormat": "atual — {{horizontalpodautoscaler}}", "refId": "A"},
            {"expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"solidarytech\"}", "legendFormat": "desejado — {{horizontalpodautoscaler}}", "refId": "B"}
          ]
        },
        {
          "id": 8,
          "title": "Tráfego de Rede — Entrada bytes/s (solidarytech)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "options": {"tooltip": {"mode": "multi"}},
          "fieldConfig": {"defaults": {"unit": "Bps", "custom": {"lineWidth": 2}}},
          "targets": [{"expr": "sum(rate(container_network_receive_bytes_total{namespace=\"solidarytech\"}[2m])) by (pod)", "legendFormat": "{{pod}}", "refId": "A"}]
        },
        {
          "id": 9,
          "title": "CPU Request vs Uso — Rightsizing",
          "type": "bargauge",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 6},
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": 0}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.9}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [
            {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\",container=\"donation-service\"}[5m])) / sum(kube_pod_container_resource_requests{namespace=\"solidarytech\",container=\"donation-service\",resource=\"cpu\"})", "legendFormat": "donation-service CPU", "refId": "A"},
            {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\",container=\"ngo-service\"}[5m])) / sum(kube_pod_container_resource_requests{namespace=\"solidarytech\",container=\"ngo-service\",resource=\"cpu\"})", "legendFormat": "ngo-service CPU", "refId": "B"},
            {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\",container=\"volunteer-service\"}[5m])) / sum(kube_pod_container_resource_requests{namespace=\"solidarytech\",container=\"volunteer-service\",resource=\"cpu\"})", "legendFormat": "volunteer-service CPU", "refId": "C"}
          ]
        },
        {
          "id": 10,
          "title": "Restarts de Containers (última 1h)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 6},
          "options": {"tooltip": {"mode": "multi"}},
          "fieldConfig": {
            "defaults": {
              "unit": "short", "custom": {"lineWidth": 2},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": 0}, {"color": "red", "value": 1}]},
              "color": {"mode": "thresholds"}
            }
          },
          "targets": [{"expr": "increase(kube_pod_container_status_restarts_total{namespace=\"solidarytech\"}[1h])", "legendFormat": "{{container}}", "refId": "A"}]
        },
        {
          "id": 11,
          "title": "Status dos Pods — solidarytech",
          "type": "table",
          "gridPos": {"x": 0, "y": 26, "w": 24, "h": 6},
          "options": {"sortBy": [{"displayName": "pod", "desc": false}]},
          "targets": [
            {
              "expr": "kube_pod_status_phase{namespace=\"solidarytech\", phase=\"Running\"}",
              "legendFormat": "{{pod}}",
              "instant": true,
              "format": "table",
              "refId": "A"
            }
          ]
        }
      ]
    }

  finops-costs.json: |
    {
      "title": "FinOps — Consumo de Recursos",
      "uid": "finops-costs",
      "tags": ["finops", "rightsizing", "costs"],
      "timezone": "browser",
      "refresh": "5m",
      "time": {"from": "now-24h", "to": "now"},
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "CPU Request vs Usage — Rightsizing",
          "description": "Compara o que foi alocado (request) vs o que está sendo consumido. Gap grande = desperdício.",
          "type": "bargauge",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"solidarytech\", resource=\"cpu\"}) by (container)",
              "legendFormat": "Request — {{ container }}"
            },
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}[5m])) by (container)",
              "legendFormat": "Usage — {{ container }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 2,
          "title": "Memória Request vs Usage — Rightsizing",
          "type": "bargauge",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"solidarytech\", resource=\"memory\"}) by (container) / 1024 / 1024",
              "legendFormat": "Request MB — {{ container }}"
            },
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}) by (container) / 1024 / 1024",
              "legendFormat": "Usage MB — {{ container }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}},
          "options": {"orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 3,
          "title": "Histórico de CPU — 24h (baseline para rightsizing)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 8, "w": 24, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"solidarytech\", container!=\"\", container!=\"POD\"}[5m])) by (container)",
              "legendFormat": "{{ container }}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit"}}
        },
        {
          "id": 4,
          "title": "Nós do Cluster — CPU Alocada vs Capacidade",
          "type": "gauge",
          "gridPos": {"x": 0, "y": 16, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\"}) / sum(kube_node_status_allocatable{resource=\"cpu\"}) * 100",
              "legendFormat": "% CPU Alocada",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Nós do Cluster — Memória Alocada vs Capacidade",
          "type": "gauge",
          "gridPos": {"x": 12, "y": 16, "w": 12, "h": 7},
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\"}) / sum(kube_node_status_allocatable{resource=\"memory\"}) * 100",
              "legendFormat": "% Memória Alocada",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          }
        }
      ]
    }
