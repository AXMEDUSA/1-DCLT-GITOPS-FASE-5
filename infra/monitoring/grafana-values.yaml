adminPassword: "$(GRAFANA_ADMIN_PASSWORD)"

persistence:
  enabled: true
  size: 5Gi

service:
  type: LoadBalancer
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

# Providers de dashboards — lê JSONs do ConfigMap montado
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: solidarytech-sre
        orgId: 1
        folder: "SRE — SolidaryTech"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/solidarytech-sre
      - name: solidarytech-overview
        orgId: 1
        folder: "Overview — SolidaryTech"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/solidarytech-overview
      - name: solidarytech-finops
        orgId: 1
        folder: "FinOps — SolidaryTech"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/solidarytech-finops

# Dashboards carregados do ConfigMap grafana-dashboards (namespace monitoring)
dashboardsConfigMaps:
  solidarytech-sre: "grafana-dashboards"
  solidarytech-overview: "grafana-dashboards"
  solidarytech-finops: "grafana-dashboards"

# Datasources provisionados automaticamente
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus:9090
        isDefault: true
        jsonData:
          timeInterval: "30s"
      - name: Loki
        type: loki
        url: http://loki:3100
        jsonData:
          maxLines: 1000

# Alerting — referência ao Alertmanager do kube-prometheus-stack
alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: slack-incidentes
        receivers:
          - uid: slack-incidentes
            type: slack
            settings:
              url: "$(SLACK_WEBHOOK_URL)"
              channel: "#incidentes"
              title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
              text: |
                *Serviço:* {{ .CommonLabels.service }}
                *Severidade:* {{ .CommonLabels.severity }}
                {{ range .Alerts }}*Descrição:* {{ .Annotations.description }}{{ end }}

  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: slack-incidentes
        group_by: ["alertname", "service"]
        matchers:
          - alertname =~ ".*"
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h

# Sidecar para detectar ConfigMaps com dashboards automaticamente
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring
  datasources:
    enabled: true
    label: grafana_datasource

# Variáveis de ambiente — senhas injetadas via Secret do Kubernetes
envFromSecret: grafana-secrets

grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/"
  auth.anonymous:
    enabled: false
  security:
    allow_embedding: true
  analytics:
    reporting_enabled: false
  dashboards:
    default_home_dashboard_path: /var/lib/grafana/dashboards/solidarytech-sre/sre-donation-service.json
