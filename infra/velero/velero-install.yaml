configuration:
  provider: azure
  backupStorageLocation:
    name: default
    provider: azure
    bucket: velero-backups-solidarytech
    config:
      resourceGroup: rg-solidarytech-fase5
      storageAccount: stsolidarytechvelero
      storageAccountKeyEnvVar: AZURE_STORAGE_ACCOUNT_ACCESS_KEY
      subscriptionId: "$(AZURE_SUBSCRIPTION_ID)"

  volumeSnapshotLocation:
    name: default
    provider: azure
    config:
      resourceGroup: rg-solidarytech-fase5
      subscriptionId: "$(AZURE_SUBSCRIPTION_ID)"

credentials:
  useSecret: true
  secretContents:
    cloud: |
      AZURE_SUBSCRIPTION_ID=$(AZURE_SUBSCRIPTION_ID)
      AZURE_TENANT_ID=$(AZURE_TENANT_ID)
      AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET=$(AZURE_CLIENT_SECRET)
      AZURE_RESOURCE_GROUP=rg-solidarytech-fase5
      AZURE_CLOUD_NAME=AzurePublicCloud

initContainers:
  - name: velero-plugin-for-azure
    image: velero/velero-plugin-for-microsoft-azure:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins

---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-backup-solidarytech
  namespace: velero
spec:
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
      - solidarytech
    storageLocation: default
    volumeSnapshotLocations:
      - default
    ttl: 720h0m0s
    labelSelector:
      matchLabels:
        backup: "true"
