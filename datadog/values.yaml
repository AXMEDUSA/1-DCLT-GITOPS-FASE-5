datadog:
  site: "us5.datadoghq.com"
  clusterName: "aks-solidarytech"
  apiKeyExistingSecret: "datadog-secret"
  clusterChecks:
    enabled: true
  orchestratorExplorer:
    enabled: true
  apm:
    instrumentation:
      enabled: true
      targets:
        - name: "default-target"
          ddTraceVersions:
            java: "1"
            python: "4"
            js: "5"
            php: "1"
            dotnet: "3"
            ruby: "2"
          ddTraceConfigs:
            - name: "DD_RUM_ENABLED"
              value: "true"
            - name: "DD_RUM_APPLICATION_ID"
              value: "0a07c365-2e44-491b-93b0-514484792985"
            - name: "DD_RUM_CLIENT_TOKEN"
              value: "pub3897dbcdcd79f9aa6d4bc615bbcf86d4"
            - name: "DD_RUM_REMOTE_CONFIGURATION_ID"
              value: "e7360263-1cef-4a13-bd39-71120b49efeb"
            - name: "DD_RUM_SITE"
              value: "us5.datadoghq.com"
  logs:
    enabled: true
    containerCollectAll: true
providers:
  aks:
    enabled: true
registry: "datadoghq.azurecr.io"
