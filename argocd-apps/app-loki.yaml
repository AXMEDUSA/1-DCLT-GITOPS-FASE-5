apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  labels:
    project: solidarytech
    tier: infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: solidarytech
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: "6.x"
      helm:
        valueFiles:
          - $values/infra/monitoring/loki-values.yaml
    - repoURL: https://github.com/AXMEDUSA/1-DCLT-GITOPS-FASE-5
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
