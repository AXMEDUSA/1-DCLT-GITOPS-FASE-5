apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  labels:
    project: solidarytech
    tier: infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: solidarytech
  sources:
    # Helm chart oficial do Grafana
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: "8.x"
      helm:
        valueFiles:
          - $values/infra/monitoring/grafana-values.yaml
    # Repo GitOps com os values e o ConfigMap de dashboards
    - repoURL: https://github.com/AXMEDUSA/1-DCLT-GITOPS-FASE-5
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
