apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
  labels:
    project: solidarytech
    tier: infra
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: solidarytech
  source:
    repoURL: https://github.com/AXMEDUSA/1-DCLT-GITOPS-FASE-5
    targetRevision: main
    path: infra/monitoring
    directory:
      include: "grafana-dashboards-configmap.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
